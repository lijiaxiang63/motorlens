name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run typecheck:electron

      - run: npm test

      # Chunk-split sanity: MediaPipe (landmarks/cameraSource/videoFile) must
      # stay lazy-loaded out of the main bundle — see CLAUDE.md.
      - run: npx vite build
